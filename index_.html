<style>
/* ============================================
   CSS VARIABLES & RESET
   ============================================ */
:root {
  --primary: #6C63FF;
  --primary-dark: #5A52D5;
  --primary-light: #8B83FF;
  --secondary: #FF6584;
  --accent: #00D2FF;
  --bg-dark: #0F0E17;
  --bg-card: #1A1A2E;
  --bg-card-hover: #222244;
  --bg-surface: #16213E;
  --text-primary: #EAEAEA;
  --text-secondary: #A0A0B0;
  --text-muted: #6C6C80;
  --success: #00C853;
  --warning: #FFB300;
  --danger: #FF5252;
  --info: #29B6F6;
  --radius: 16px;
  --radius-sm: 10px;
  --radius-xs: 6px;
  --shadow: 0 8px 32px rgba(0,0,0,0.3);
  --shadow-sm: 0 4px 16px rgba(0,0,0,0.2);
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font);
  background: var(--bg-dark);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-dark); }
::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }

.hidden { display: none !important; }
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.justify-center { justify-content: center; }
.justify-between { justify-content: space-between; }
.gap-1 { gap: 8px; }
.gap-2 { gap: 16px; }
.gap-3 { gap: 24px; }
.w-full { width: 100%; }
.text-center { text-align: center; }
.mt-1 { margin-top: 8px; }
.mt-2 { margin-top: 16px; }
.mt-3 { margin-top: 24px; }
.mb-2 { margin-bottom: 16px; }
.p-2 { padding: 16px; }
.p-3 { padding: 24px; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}
.animate-fade { animation: fadeIn 0.5s ease-out; }
.animate-slide { animation: slideUp 0.6s ease-out; }

/* ============================================
   BUTTONS
   ============================================ */
.btn {
  padding: 12px 28px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  text-decoration: none;
  font-family: var(--font);
}
.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  box-shadow: 0 4px 15px rgba(108,99,255,0.4);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(108,99,255,0.6);
}
.btn-secondary {
  background: var(--bg-card);
  color: var(--text-primary);
  border: 1px solid rgba(255,255,255,0.1);
}
.btn-secondary:hover { background: var(--bg-card-hover); }
.btn-danger {
  background: linear-gradient(135deg, var(--danger), #D32F2F);
  color: white;
}
.btn-success {
  background: linear-gradient(135deg, var(--success), #00A844);
  color: white;
}
.btn-warning {
  background: linear-gradient(135deg, var(--warning), #FF8F00);
  color: white;
}
.btn-info {
  background: linear-gradient(135deg, var(--info), #0288D1);
  color: white;
}
.btn-sm { padding: 8px 16px; font-size: 13px; }
.btn-block { width: 100%; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ============================================
   FORMS
   ============================================ */
.form-group { margin-bottom: 20px; }
.form-group label {
  display: block;
  margin-bottom: 8px;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-secondary);
}
.form-input {
  width: 100%;
  padding: 14px 18px;
  background: var(--bg-surface);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 15px;
  transition: var(--transition);
  font-family: var(--font);
}
.form-input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(108,99,255,0.2);
}
.form-input::placeholder { color: var(--text-muted); }
textarea.form-input { min-height: 100px; resize: vertical; }
select.form-input { cursor: pointer; }

/* ============================================
   CARDS & PROGRESS
   ============================================ */
.card {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 24px;
  border: 1px solid rgba(255,255,255,0.05);
  transition: var(--transition);
}
.card:hover {
  border-color: rgba(108,99,255,0.3);
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}
.card-flat { border: none; }
.card-flat:hover { transform: none; }

.progress-bar {
  height: 8px;
  background: rgba(255,255,255,0.1);
  border-radius: 4px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  background: linear-gradient(90deg, var(--primary), var(--accent));
}

/* ============================================
   AUTH SCREEN
   ============================================ */
#auth-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: linear-gradient(135deg, #0F0E17 0%, #1A1A2E 50%, #16213E 100%);
  position: relative;
  overflow: hidden;
}
#auth-screen::before {
  content: '';
  position: absolute;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(108,99,255,0.15), transparent 70%);
  top: -100px; right: -100px;
  border-radius: 50%;
}
#auth-screen::after {
  content: '';
  position: absolute;
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(255,101,132,0.1), transparent 70%);
  bottom: -50px; left: -50px;
  border-radius: 50%;
}
.auth-container {
  width: 100%;
  max-width: 420px;
  position: relative;
  z-index: 1;
}
.auth-logo { text-align: center; margin-bottom: 40px; }
.auth-logo .logo-icon {
  width: 72px; height: 72px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  margin: 0 auto 16px;
  box-shadow: 0 8px 32px rgba(108,99,255,0.3);
}
.auth-logo h1 {
  font-size: 28px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--text-primary), var(--primary-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.auth-logo p { color: var(--text-secondary); font-size: 14px; margin-top: 4px; }
.auth-card {
  background: rgba(26,26,46,0.8);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius);
  padding: 32px;
  box-shadow: var(--shadow);
}
.auth-tabs {
  display: flex;
  background: var(--bg-surface);
  border-radius: var(--radius-sm);
  padding: 4px;
  margin-bottom: 28px;
}
.auth-tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  border-radius: var(--radius-xs);
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-muted);
  transition: var(--transition);
  border: none;
  background: none;
  font-family: var(--font);
}
.auth-tab.active { background: var(--primary); color: white; }
.auth-msg {
  padding: 12px 16px;
  border-radius: var(--radius-xs);
  font-size: 13px;
  margin-bottom: 16px;
  display: none;
}
.auth-msg.error { display: block; background: rgba(255,82,82,0.15); color: var(--danger); border: 1px solid rgba(255,82,82,0.3); }
.auth-msg.success { display: block; background: rgba(0,200,83,0.15); color: var(--success); border: 1px solid rgba(0,200,83,0.3); }
.auth-msg.info { display: block; background: rgba(108,99,255,0.15); color: var(--primary-light); border: 1px solid rgba(108,99,255,0.3); }

<!-- « MULAI PART 2 » -->
/* ============================================
   APP SHELL
   ============================================ */
#app-screen { min-height: 100vh; padding-bottom: 80px; }

.app-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(15,14,23,0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  padding: 12px 16px;
}
.header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  max-width: 1200px;
  margin: 0 auto;
}
.header-title {
  font-size: 16px;
  font-weight: 700;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.header-user {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--bg-card);
  padding: 6px 12px 6px 6px;
  border-radius: 24px;
  font-size: 13px;
  cursor: pointer;
}
.header-user .avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  color: white;
}
.back-btn {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: var(--bg-card);
  border: none;
  color: var(--text-primary);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.page-content {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px 16px;
}
.page-title {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 6px;
}
.page-subtitle {
  color: var(--text-secondary);
  font-size: 14px;
  margin-bottom: 24px;
}

/* Bottom Nav — 4 menu */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(15,14,23,0.95);
  backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255,255,255,0.05);
  display: flex;
  justify-content: space-around;
  padding: 8px 4px calc(8px + env(safe-area-inset-bottom));
  z-index: 100;
}
.nav-item {
  flex: 1;
  max-width: 90px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 6px 4px;
  border-radius: 10px;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 11px;
  font-weight: 600;
  background: none;
  border: none;
  transition: var(--transition);
  font-family: var(--font);
}
.nav-item .nav-icon { font-size: 22px; line-height: 1; }
.nav-item.active { color: var(--primary-light); }
.nav-item.active .nav-icon { transform: translateY(-2px); }

/* Stats grid */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 18px;
  border: 1px solid rgba(255,255,255,0.05);
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 60px; height: 60px;
  background: radial-gradient(circle, var(--stat-color, rgba(108,99,255,0.2)), transparent 70%);
  border-radius: 50%;
  transform: translate(20px, -20px);
}
.stat-icon { font-size: 26px; margin-bottom: 6px; }
.stat-value { font-size: 26px; font-weight: 700; }
.stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

/* Module cards */
.module-list { display: flex; flex-direction: column; gap: 14px; }
.module-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 18px;
  border: 1px solid rgba(255,255,255,0.05);
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  gap: 16px;
  align-items: flex-start;
}
.module-card:hover {
  transform: translateY(-2px);
  border-color: rgba(108,99,255,0.4);
  box-shadow: var(--shadow-sm);
}
.module-icon {
  width: 54px; height: 54px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  flex-shrink: 0;
}
.module-body { flex: 1; min-width: 0; }
.module-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.module-desc { font-size: 13px; color: var(--text-secondary); margin-bottom: 10px; line-height: 1.5; }
.module-meta { display: flex; gap: 12px; font-size: 12px; color: var(--text-muted); }
.module-meta span { display: inline-flex; align-items: center; gap: 4px; }
.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
}
.badge-primary { background: rgba(108,99,255,0.2); color: var(--primary-light); }
.badge-success { background: rgba(0,200,83,0.2); color: var(--success); }
.badge-warning { background: rgba(255,179,0,0.2); color: var(--warning); }
.badge-danger { background: rgba(255,82,82,0.2); color: var(--danger); }
.badge-info { background: rgba(41,182,246,0.2); color: var(--info); }

/* Lesson view */
.lesson-content {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 24px;
  line-height: 1.8;
}
.lesson-content h3 { font-size: 20px; margin: 24px 0 12px; color: var(--primary-light); }
.lesson-content h4 { font-size: 16px; margin: 20px 0 10px; color: var(--accent); }
.lesson-content p { margin-bottom: 14px; color: var(--text-primary); font-size: 15px; }
.lesson-content ul, .lesson-content ol { margin: 12px 0 14px 24px; color: var(--text-primary); }
.lesson-content li { margin-bottom: 6px; font-size: 15px; }
.lesson-content strong { color: var(--primary-light); font-weight: 600; }
.lesson-content em { color: var(--accent); font-style: italic; }
.lesson-content blockquote {
  border-left: 3px solid var(--primary);
  padding: 10px 16px;
  background: rgba(108,99,255,0.08);
  border-radius: 8px;
  margin: 14px 0;
  color: var(--text-secondary);
}
.lesson-content code {
  background: rgba(108,99,255,0.15);
  padding: 2px 8px;
  border-radius: 4px;
  color: var(--primary-light);
  font-family: 'Consolas', monospace;
  font-size: 14px;
}

/* Quiz */
.quiz-box {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 24px;
}
.quiz-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  font-size: 13px;
  color: var(--text-secondary);
}
.quiz-question {
  font-size: 17px;
  font-weight: 600;
  margin-bottom: 20px;
  line-height: 1.5;
}
.quiz-options { display: flex; flex-direction: column; gap: 10px; }
.quiz-opt {
  padding: 14px 16px;
  background: var(--bg-surface);
  border: 2px solid transparent;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: flex-start;
  gap: 12px;
  text-align: left;
  font-family: var(--font);
  color: var(--text-primary);
  font-size: 14px;
  line-height: 1.5;
  width: 100%;
}
.quiz-opt:hover { border-color: var(--primary); background: rgba(108,99,255,0.1); }
.quiz-opt.selected { border-color: var(--primary); background: rgba(108,99,255,0.2); }
.quiz-opt.correct { border-color: var(--success); background: rgba(0,200,83,0.15); }
.quiz-opt.wrong { border-color: var(--danger); background: rgba(255,82,82,0.15); }
.quiz-opt .opt-letter {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 13px;
  flex-shrink: 0;
}
.quiz-opt.selected .opt-letter,
.quiz-opt.correct .opt-letter { background: var(--primary); color: white; }
.quiz-opt.wrong .opt-letter { background: var(--danger); color: white; }
.quiz-opt.correct .opt-letter { background: var(--success); color: white; }

.result-card { text-align: center; padding: 36px 24px; }
.result-score {
  font-size: 56px;
  font-weight: 800;
  margin: 12px 0;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.result-label { font-size: 14px; color: var(--text-secondary); margin-bottom: 20px; }

/* Review */
.review-item {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 12px;
  border-left: 4px solid var(--primary);
}
.review-item.wrong { border-left-color: var(--danger); }
.review-item.correct { border-left-color: var(--success); }
.review-q { font-weight: 600; margin-bottom: 10px; line-height: 1.5; }
.review-opts { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.review-opt {
  padding: 8px 12px;
  border-radius: var(--radius-xs);
  background: var(--bg-surface);
  font-size: 13px;
  display: flex;
  gap: 8px;
  align-items: flex-start;
}
.review-opt.is-correct { background: rgba(0,200,83,0.15); color: var(--success); }
.review-opt.is-user { background: rgba(108,99,255,0.15); }
.review-opt.is-wrong { background: rgba(255,82,82,0.15); color: var(--danger); }
.review-expl {
  background: rgba(108,99,255,0.08);
  padding: 10px 12px;
  border-radius: var(--radius-xs);
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
}
.review-expl strong { color: var(--primary-light); }

/* Glosarium */
.glossary-search {
  margin-bottom: 16px;
  position: relative;
}
.glossary-list { display: flex; flex-direction: column; gap: 10px; }
.glossary-item {
  background: var(--bg-card);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  border-left: 3px solid var(--primary);
}
.glossary-term {
  font-size: 15px;
  font-weight: 700;
  color: var(--primary-light);
  margin-bottom: 4px;
}
.glossary-def {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
}
.glossary-empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
}

/* Admin */
.admin-tabs { display: flex; gap: 6px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 4px; }
.admin-tab {
  padding: 8px 16px;
  background: var(--bg-card);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  font-family: var(--font);
}
.admin-tab.active {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
}
.data-table {
  background: var(--bg-card);
  border-radius: var(--radius);
  overflow: hidden;
}
.data-row {
  display: grid;
  gap: 12px;
  padding: 14px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  align-items: center;
  font-size: 13px;
}
.data-row:last-child { border-bottom: none; }
.data-row.header {
  background: var(--bg-surface);
  font-weight: 600;
  color: var(--text-secondary);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.row-student { grid-template-columns: 1fr auto; }
.row-module { grid-template-columns: 40px 1fr auto; }
.row-attempt { grid-template-columns: 1fr 70px 70px auto; }

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;

async function dbPut(collection, id, data) {
  await db.collection(collection).doc(String(id)).set(data, { merge: false });
}
async function dbMerge(collection, id, data) {
  await db.collection(collection).doc(String(id)).set(data, { merge: true });
}
async function dbGet(collection, id) {
  const snap = await db.collection(collection).doc(String(id)).get();
  return snap.exists ? snap.data() : null;
}
async function dbGetAll(collection) {
  const snap = await db.collection(collection).get();
  return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}
async function dbGetByField(collection, field, value) {
  const snap = await db.collection(collection).where(field, '==', value).get();
  return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}
async function dbDelete(collection, id) {
  await db.collection(collection).doc(String(id)).delete();
}
async function dbAdd(collection, data) {
  const ref = await db.collection(collection).add(data);
  return ref.id;
}

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('id-ID', { day:'2-digit', month:'short', year:'numeric' })
    + ' ' + d.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' });
}
function escapeHtml(str) {
  if (str == null) return '';
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

      { id: "l1-1", title: "Bagian & Jenis Kamera", body: `
<h3>1. Mengenal Kamera</h3>
<p>Kamera adalah alat perekam gambar yang inti kerjanya: <strong>cahaya masuk → lensa → sensor → gambar</strong>.</p>
<h4>Jenis kamera yang umum di produksi video</h4>
<ul>
<li><strong>DSLR / Mirrorless</strong> — lensa bisa ganti, kualitas tinggi, cocok untuk film pendek & konten kreator.</li>
<li><strong>Camcorder</strong> — ergonomis untuk merekam panjang, audio built-in lebih baik.</li>
<li><strong>Kamera HP</strong> — praktis, sensor kecil tapi sudah sangat mumpuni untuk latihan.</li>
<li><strong>Action Cam</strong> — tahan banting, sudut lebar, untuk adegan dinamis.</li>
</ul>
<h4>Bagian penting kamera</h4>
<ul>
<li><strong>Lensa</strong> — menentukan sudut pandang & karakter gambar.</li>
<li><strong>Sensor</strong> — menangkap cahaya menjadi gambar digital.</li>
<li><strong>Viewfinder / LCD</strong> — untuk membingkai objek.</li>
<li><strong>Tombol kontrol</strong> — pengaturan ISO, Shutter, Aperture, White Balance.</li>
</ul>
<blockquote>Kamera hanyalah alat. Gambar yang baik lahir dari <em>mata penata</em> yang paham komposisi & cahaya.</blockquote>` },
      { id: "l1-2", title: "Ukuran Gambar (Shot Size)", body: `
<h3>Ukuran Gambar Dasar</h3>
<p>Ukuran gambar menentukan <strong>berapa banyak</strong> subjek & lingkungan yang masuk dalam bingkai.</p>
<ul>
<li><strong>Extreme Long Shot (ELS)</strong> — seluruh lanskap, subjek tampak kecil.</li>
<li><strong>Long Shot (LS)</strong> — subjek utuh + konteks ruangnya.</li>
<li><strong>Medium Shot (MS)</strong> — pinggang ke atas kepala; khas dialog.</li>
<li><strong>Close-up (CU)</strong> — dagu sampai ubun-ubun; fokus ekspresi.</li>
<li><strong>Extreme Close-up (ECU)</strong> — detail seperti mata atau bibir.</li>
</ul>
<h4>Kapan memakai apa?</h4>
<ul>
<li>ELS/LS — memperkenalkan lokasi (<em>establishing shot</em>).</li>
<li>MS — percakapan dua orang.</li>
<li>CU/ECU — memperkuat emosi atau menonjolkan detail penting.</li>

<h3>Aturan Komposisi Dasar</h3>
<h4>1. Rule of Thirds</h4>
<p>Bagi bingkai menjadi <strong>3 x 3</strong>. Tempatkan subjek di titik pertemuan garis.</p>
<h4>2. Leading Lines</h4>
<p>Gunakan garis (jalan, pagar, sungai) untuk <em>menuntun</em> mata penonton menuju subjek.</p>

<h4>4. Foreground – Midground – Background</h4>
<p>Susun tiga lapisan kedalaman agar gambar tidak datar.</p>

<p>Manfaatkan garis pusat atau pola berulang untuk kesan rapi dan dramatis.</p>

    lessons: [
      { id: "l2-1", title: "Segitiga Eksposur", body: `
<h3>Segitiga Eksposur</h3>
<p>Eksposur ditentukan 3 hal:</p>
<ul>
<li><strong>Aperture (f-stop)</strong> — seberapa besar bukaan lensa. Kecil f/1.8 = gambar terang + DoF tipis. Besar f/11 = gambar lebih gelap + DoF dalam.</li>
<li><strong>Shutter Speed</strong> — lama sensor terbuka. Cepat (1/500) = gerakan beku. Lambat (1/30) = motion blur.</li>
<li><strong>ISO</strong> — sensitivitas sensor. Rendah (100–400) = bersih. Tinggi (3200+) = terang tapi <em>noise</em>.</li>
</ul>
<h4>Aturan shutter speed untuk video</h4>
<p>Umum: <code>shutter = 1 / (2 × fps)</code>. Pada 24 fps → 1/50, pada 30 fps → 1/60. Aturan ini membuat gerak terlihat natural.</p>` },
      { id: "l2-2", title: "White Balance & Frame Rate", body: `
<h3>White Balance (WB)</h3>
<p>WB memastikan warna putih terekam netral sesuai suhu warna sumber cahaya (Kelvin).</p>

<li>Daylight — ~5600K (putih kebiruan).</li>
<li>Cloudy — ~6500K.</li>
</ul>
<p>Gunakan <strong>custom WB</strong> dengan kertas putih untuk hasil paling akurat.</p>
<h3>Frame Rate (fps)</h3>

      { id: "l3-1", title: "Jenis Gerakan Kamera", body: `
<h3>Gerakan Kamera</h3>
<ul>
<li><strong>Pan</strong> — kamera berputar horizontal di sumbu tetap.</li>
<li><strong>Tilt</strong> — kamera berputar vertikal di sumbu tetap.</li>
<li><strong>Pedestal</strong> — naik-turun vertikal (kamera ikut berpindah tinggi).</li>
<li><strong>Dolly</strong> — maju/mundur, biasanya pakai rel.</li>
<li><strong>Tracking</strong> — mengikuti subjek secara sejajar.</li>
<li><strong>Handheld</strong> — dipegang tangan, kesan realis.</li>
<li><strong>Gimbal/Steadicam</strong> — gerak halus meski bergerak cepat.</li>

<li><strong>High Angle</strong> — dari atas; subjek tampak lemah/kecil.</li>
<li><strong>Low Angle</strong> — dari bawah; subjek tampak kuat/berkuasa.</li>
<li><strong>Bird's Eye (top view)</strong> — tegak lurus dari atas.</li>
<li><strong>Dutch Angle</strong> — miring; kesan tegang/tidak seimbang.</li>
<li><strong>POV</strong> — sudut pandang karakter.</li>
<li><strong>Over the Shoulder (OTS)</strong> — dari belakang bahu; khas dialog.</li>

      { id: "l4-1", title: "Karakter & Kualitas Cahaya", body: `
<h3>Karakter Cahaya</h3>
<ul>
<li><strong>Hard light</strong> — sumber kecil/jauh, bayangan tegas. Contoh: matahari siang, spotlight.</li>
<li><strong>Soft light</strong> — sumber besar/dekat + diffuser, bayangan lembut. Contoh: softbox, langit mendung.</li>
</ul>
<h4>Arah Cahaya</h4>
<ul>
<li><strong>Front</strong> — subjek rata, datar.</li>
<li><strong>Side</strong> — membentuk tekstur.</li>
<li><strong>Back</strong> — memisahkan subjek dari latar.</li>
<li><strong>Top/Bottom</strong> — dramatis/mencekam.</li>
</ul>
<h4>Kontras</h4>
<p><strong>Contrast ratio</strong> = perbandingan intensitas key : fill. 2:1 halus, 4:1 dramatis, 8:1 sangat dramatis.</p>` },

<h3>Suhu Warna (Kelvin)</h3>
<p>Dingin (biru, >5600K) → misterius, sedih, modern.<br>Hangat (kuning, <3500K) → nyaman, romantis, nostalgik.</p>
<h4>High Key vs Low Key</h4>
<ul>
<li><strong>High Key</strong> — terang merata, bayangan minim; komedi, iklan produk.</li>
<li><strong>Low Key</strong> — bayangan dominan, kontras tinggi; thriller, film noir.</li>
</ul>
<blockquote>Cahaya bukan hanya soal "terang", tapi tentang <em>mood</em> cerita.</blockquote>` }

      { id: "l5-1", title: "Pola 3-Point", body: `
<h3>Three-Point Lighting</h3>
<ul>
<li><strong>Key Light</strong> — sumber utama, biasanya 45° dari depan. Menentukan karakter.</li>
<li><strong>Fill Light</strong> — mengurangi bayangan dari key, biasanya di seberang key dengan intensitas lebih rendah.</li>
<li><strong>Back Light (Rim)</strong> — dari belakang subjek untuk kontur & pemisahan dari latar.</li>
</ul>
<h4>Langkah setup</h4>
<ol>
<li>Tempatkan key light → cek ekspos di wajah.</li>
<li>Tambahkan fill di sisi berlawanan → atur rasio.</li>
<li>Pasang back light di atas-belakang → pastikan tidak menyilaukan lensa.</li>
<li>Tambah background light bila ingin memisahkan lebih kuat.</li>
</ol>` },
      { id: "l5-2", title: "Motivated & Practical Lighting", body: `
<h3>Motivated Lighting</h3>
<p>Cahaya yang <em>tampak</em> datang dari sumber dalam cerita (jendela, lampu meja). Walau sumber aslinya lampu buatan, arah & warnanya dibuat konsisten dengan motivasinya.</p>
<h3>Practical Lighting</h3>
<p>Lampu yang masuk bingkai dan memang menyala (lampu meja nyala, TV menyala). Menambah realisme & kedalaman.</p>
<h3>Bouncing & Diffusion</h3>
<ul>
<li><strong>Bounce</strong> — pantulkan cahaya ke dinding/reflektor untuk hasil lembut.</li>
<li><strong>Diffuse</strong> — saring cahaya lewat silk/softbox agar bayangan halus.</li>
</ul>` }

      { id: "l6-1", title: "Jenis Lampu & Aksesori", body: `
<h3>Jenis Lampu</h3>
<ul>
<li><strong>Tungsten</strong> — hangat (~3200K), panas, daya tinggi.</li>
<li><strong>HMI</strong> — daylight (~5600K), terang, daya besar.</li>
<li><strong>LED</strong> — hemat daya, sering bi-color/RGB, tidak panas.</li>
<li><strong>Fluorescent (Kino Flo)</strong> — lembut dan merata, cocok untuk dialog.</li>
</ul>
<h3>Aksesori Penting</h3>
<ul>
<li><strong>Softbox</strong> — melembutkan cahaya.</li>
<li><strong>Barn door</strong> — mengarahkan pancaran.</li>
<li><strong>Flag</strong> — menutup cahaya yang tidak diinginkan.</li>
<li><strong>Reflector</strong> — memantulkan cahaya matahari/lampu.</li>
<li><strong>Gel</strong> — mengubah warna cahaya.</li>
</ul>` },

<h3>Keselamatan Lokasi</h3>
<ul>
<li>Pastikan daya listrik cukup (hitung total watt lampu vs kapasitas stop kontak).</li>
<li>Gunakan <strong>safety cable</strong> pada lampu yang terpasang di stand tinggi.</li>
<li>Lampu panas (tungsten/HMI) — beri jarak aman dari bahan mudah terbakar.</li>
<li>Pakai <strong>sarung tangan tahan panas</strong> saat mengganti gel/diffuser.</li>
<li>Rapikan kabel dengan <em>gaffer tape</em> untuk menghindari tersandung.</li>
<li>Gunakan stabilizer/UPS jika tegangan listrik tidak stabil.</li>
</ul>
<blockquote>Syuting aman adalah syuting yang selesai tepat waktu dengan semua kru pulang sehat.</blockquote>` }

// ============================================
// APP STATE
// ============================================
const state = {
  user: null,            // { uid, email, displayName, role }
  userData: null,        // dokumen user dari Firestore
  modules: [],           // dari DEFAULT_MODULES / Firestore
  progress: {},          // { [moduleId]: { [lessonId]: true }, completedAt? }
  baselineResult: null,  // { score, total, answers }
  finalResult: null,     // { score, total, answers, timestamp }
  currentModuleId: null,
  currentLessonIndex: 0
};

// ============================================
// INIT APP
// ============================================
async function initApp(){
  try {
    showLoading(true);
    // Auth listener
    firebase.auth().onAuthStateChanged(async (user)=>{
      if (user){
        state.user = { uid: user.uid, email: user.email, displayName: user.displayName || user.email.split('@')[0] };
        await loadUserData();
        await loadModules();
        await loadProgress();
        showApp();
      } else {
        state.user = null;
        showAuth();
      }
      showLoading(false);
    });

    // Wire form listeners
    bindAuthForms();
    bindNav();
  } catch (e){
    console.error('initApp error', e);
    showToast('Gagal memulai aplikasi', 'error');
    showLoading(false);
  }
}

// ============================================
// LOADER HELPERS
// ============================================
function showLoading(on){
  const el = document.getElementById('loading-overlay'); // ← PERBAIKAN
  if (!el) return;
  el.classList.toggle('hidden', !on);
}
function showAuth(){
  document.getElementById('auth-screen')?.classList.remove('hidden');
  document.getElementById('app-screen')?.classList.add('hidden');
}
function showApp(){
  document.getElementById('auth-screen')?.classList.add('hidden');
  document.getElementById('app-screen')?.classList.remove('hidden');
  renderHeader();
  navigateTo('dashboard');
}
function serverTime() {
  return firebase.firestore.FieldValue.serverTimestamp();
}

// ============================================
// AUTH
// ============================================
function bindAuthForms(){
  const loginForm = document.getElementById('login-form');
  const registerForm = document.getElementById('register-form');
  const toRegister = document.getElementById('to-register');
  const toLogin = document.getElementById('to-login');

  toRegister?.addEventListener('click', (e)=>{
    e.preventDefault();
    loginForm.classList.add('hidden');
    registerForm.classList.remove('hidden');
    toRegister.classList.add('active');
    toLogin.classList.remove('active');
  });
  toLogin?.addEventListener('click', (e)=>{
    e.preventDefault();
    registerForm.classList.add('hidden');
    loginForm.classList.remove('hidden');
    toLogin.classList.add('active');
    toRegister.classList.remove('active');
  });

  loginForm?.addEventListener('submit', async (e)=>{
    e.preventDefault();
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-pass').value;
    try {
      showLoading(true);
      await firebase.auth().signInWithEmailAndPassword(email, pass);
      showToast('Selamat datang kembali!','success');
    } catch (err){
      showToast(mapAuthError(err.code),'error');
      showLoading(false); // ← penting: matikan loading jika gagal
    }
  });

  registerForm?.addEventListener('submit', async (e)=>{
    e.preventDefault();
    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const pass  = document.getElementById('reg-pass').value;
    const role  = document.getElementById('reg-role').value;
    try {
      showLoading(true);
      const cred = await firebase.auth().createUserWithEmailAndPassword(email, pass);
      await cred.user.updateProfile({ displayName: name });
      await db.collection('users').doc(cred.user.uid).set({
        uid: cred.user.uid,
        name, email, role,
        createdAt: serverTime()
      });
      showToast('Akun berhasil dibuat!','success');
    } catch (err){
      showToast(mapAuthError(err.code),'error');
      showLoading(false);
    }
  });
}

function mapAuthError(code){
  switch(code){
    case 'auth/invalid-email': return 'Format email tidak valid.';
    case 'auth/user-not-found': return 'Akun tidak ditemukan.';
    case 'auth/wrong-password': return 'Password salah.';
    case 'auth/email-already-in-use': return 'Email sudah terdaftar.';
    case 'auth/weak-password': return 'Password minimal 6 karakter.';
    case 'auth/network-request-failed': return 'Jaringan tidak tersedia.';
    default: return 'Terjadi kesalahan: '+code;
  }
}

async function logout(){
  try {
    await firebase.auth().signOut();
    state.user = null; state.userData = null;
    state.progress = {}; state.finalResult = null; state.baselineResult = null;
    showToast('Berhasil keluar','info');
  } catch (e){ showToast('Gagal keluar','error'); }
}

// ============================================
// USER DATA / PROGRESS
// ============================================
async function loadUserData(){
  const snap = await db.collection('users').doc(state.user.uid).get();
  if (snap.exists){
    state.userData = snap.data();
    state.user.role = snap.data().role || 'siswa';
  } else {
    // auto-provision fallback
    await db.collection('users').doc(state.user.uid).set({
      uid: state.user.uid, email: state.user.email,
      name: state.user.displayName, role: 'siswa', createdAt: serverTime()
    });
    state.userData = { role: 'siswa' };
    state.user.role = 'siswa';
  }
}

async function loadModules(){
  // Ambil dari Firestore bila ada, kalau tidak pakai default
  try {
    const snap = await db.collection('modules').orderBy('order').get();
    if (!snap.empty){
      state.modules = snap.docs.map(d=>d.data());
      return;
    }
  } catch(e){ console.log('Pakai modules default',e); }
  state.modules = DEFAULT_MODULES.map((m,i)=>({ ...m, order:i }));
}

async function loadProgress(){
  const ref = db.collection('progress').doc(state.user.uid);
  const snap = await ref.get();
  state.progress = snap.exists ? (snap.data() || {}) : {};
  state.baselineResult = state.progress.baseline || null;
  state.finalResult   = state.progress.final    || null;
}

async function saveLessonDone(moduleId, lessonId){
  const ref = db.collection('progress').doc(state.user.uid);
  state.progress[moduleId] = state.progress[moduleId] || {};
  state.progress[moduleId][lessonId] = true;
  await ref.set({ ...state.progress, updatedAt: serverTime() }, { merge:true });
}

// ============================================
// NAVIGATION
// ============================================
const screens = ['dashboard','modules','module-detail','lesson','assessment','baseline','glosarium','admin','result'];
function navigateTo(screen, payload){
  screens.forEach(s=>{
    const el = document.getElementById('screen-'+s);
    if (el) el.classList.toggle('hidden', s !== screen);
  });
  switch(screen){
    case 'dashboard': renderDashboard(); break;
    case 'modules': renderModuleList(); break;
    case 'module-detail': renderModuleDetail(payload); break;
    case 'lesson': renderLesson(payload); break;
    case 'assessment': renderAssessment(); break;
    case 'baseline': renderBaseline(); break;
    case 'glosarium': renderGlosarium(); break;
    case 'admin': renderAdmin(); break;
    case 'result': renderResult(payload); break;
  }
  window.scrollTo({top:0, behavior:'smooth'});
}

function bindNav(){
  document.getElementById('btn-logout')?.addEventListener('click', logout);
  document.querySelectorAll('[data-nav]').forEach(btn=>{
    btn.addEventListener('click', ()=> navigateTo(btn.dataset.nav));
  });
}

function renderHeader(){
  const el = document.getElementById('user-info');
  if (!el) return;
  const role = state.user.role === 'guru' ? '👩‍🏫 Guru' : '👨‍🎓 Siswa';
  el.innerHTML = `<strong>${state.user.displayName}</strong> · <span class="badge">${role}</span>`;
  // Tampilkan menu admin hanya untuk guru
  document.querySelectorAll('[data-role="guru"]').forEach(el=>{
    el.classList.toggle('hidden', state.user.role !== 'guru');
  });
}

// ============================================
// DASHBOARD
// ============================================
function computeOverallProgress(){
  const contentModules = state.modules.filter(m=>m.type==='content');
  let totalLessons = 0, done = 0;
  contentModules.forEach(m=>{
    totalLessons += (m.lessons||[]).length;
    const pm = state.progress[m.id] || {};
    (m.lessons||[]).forEach(l=>{ if (pm[l.id]) done++; });
  });
  return { totalLessons, done, percent: totalLessons? Math.round(done*100/totalLessons) : 0 };
}

function renderDashboard(){
  const root = document.getElementById('screen-dashboard');
  if (!root) return;
  const prog = computeOverallProgress();
  const baselineTxt = state.baselineResult
    ? `Skor awal: <strong>${state.baselineResult.score}/${state.baselineResult.total}</strong>`
    : 'Belum mengerjakan asesmen awal.';
  const finalTxt = state.finalResult
    ? `Skor akhir: <strong>${state.finalResult.score}/${state.finalResult.total}</strong>`
    : 'Belum mengerjakan asesmen akhir.';

  root.innerHTML = `
    <section class="hero">
      <h2>Halo, ${escapeHtml(state.user.displayName)} 👋</h2>
      <p>Selamat belajar <strong>Tata Kamera & Tata Cahaya</strong>.</p>
    </section>
    <section class="cards">
      <div class="card">
        <div class="card-label">Progres Belajar</div>
        <div class="card-big">${prog.percent}%</div>
        <div class="progress"><div class="progress-bar" style="width:${prog.percent}%"></div></div>
        <div class="muted">${prog.done} dari ${prog.totalLessons} pelajaran</div>
      </div>
      <div class="card">
        <div class="card-label">Asesmen Awal</div>
        <div>${baselineTxt}</div>
        <button class="btn btn-secondary" data-nav="baseline">${state.baselineResult?'Ulangi':'Mulai'}</button>
      </div>
      <div class="card">
        <div class="card-label">Asesmen Akhir</div>
        <div>${finalTxt}</div>
        <button class="btn btn-primary" data-nav="assessment">${state.finalResult?'Ulangi':'Mulai'}</button>
      </div>
    </section>
    <section class="quick-actions">
      <button class="btn" data-nav="modules">📚 Mulai Modul</button>
      <button class="btn" data-nav="glosarium">📖 Glosarium</button>
      <button class="btn" data-role="guru" data-nav="admin">⚙️ Dashboard Guru</button>
    </section>
  `;
  // Re-bind setelah re-render
  root.querySelectorAll('[data-nav]').forEach(btn=>{
    btn.addEventListener('click', ()=> navigateTo(btn.dataset.nav));
  });
  if (state.user.role !== 'guru'){
    root.querySelectorAll('[data-role="guru"]').forEach(b=>b.classList.add('hidden'));
  }
}

// ============================================
// MODULE LIST
// ============================================
function renderModuleList(){
  const root = document.getElementById('screen-modules');
  if (!root) return;
  const cards = state.modules.map(m=>{
    const lessons = m.lessons || [];
    const pm = state.progress[m.id] || {};
    const doneCount = lessons.filter(l=>pm[l.id]).length;
    const pct = lessons.length ? Math.round(doneCount*100/lessons.length) : (pm._done?100:0);
    return `
      <div class="module-card" data-module="${m.id}">
        <div class="mc-icon">${m.icon||'📘'}</div>
        <div class="mc-body">
          <div class="mc-title">${escapeHtml(m.title)}</div>
          <div class="mc-tp">${m.tp||''}</div>
          <div class="mc-desc">${escapeHtml(m.desc||'')}</div>
          <div class="progress"><div class="progress-bar" style="width:${pct}%"></div></div>
          <div class="muted">${lessons.length? (doneCount+' / '+lessons.length+' pelajaran') : (m.type==='baseline'?'Asesmen Awal':(m.type==='final'?'Asesmen Akhir':''))}</div>
        </div>
      </div>`;
  }).join('');
  root.innerHTML = `
    <div class="page-head">
      <button class="btn btn-ghost" data-nav="dashboard">← Dashboard</button>
      <h2>Daftar Modul</h2>
    </div>
    <div class="module-grid">${cards}</div>
  `;
  root.querySelectorAll('[data-module]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const id = el.dataset.module;
      const m = state.modules.find(x=>x.id===id);
      if (!m) return;
      if (m.type==='baseline') navigateTo('baseline');
      else if (m.type==='final') navigateTo('assessment');
      else navigateTo('module-detail', id);
    });
  });
  root.querySelectorAll('[data-nav]').forEach(b=> b.addEventListener('click', ()=>navigateTo(b.dataset.nav)));
}

// ============================================
// MODULE DETAIL
// ============================================
function renderModuleDetail(moduleId){
  state.currentModuleId = moduleId;
  const m = state.modules.find(x=>x.id===moduleId);
  const root = document.getElementById('screen-module-detail');
  if (!m || !root) { navigateTo('modules'); return; }
  const pm = state.progress[m.id] || {};
  const rows = (m.lessons||[]).map((l,i)=>`
    <li class="lesson-row" data-idx="${i}">
      <span class="lr-num">${i+1}</span>
      <span class="lr-title">${escapeHtml(l.title)}</span>
      <span class="lr-status">${pm[l.id]?'✅':'○'}</span>
    </li>`).join('');
  root.innerHTML = `
    <div class="page-head">
      <button class="btn btn-ghost" data-nav="modules">← Modul</button>
      <h2>${m.icon||''} ${escapeHtml(m.title)}</h2>
    </div>
    <p class="muted">${escapeHtml(m.desc||'')}</p>
    <ul class="lesson-list">${rows || '<li class="muted">Belum ada pelajaran.</li>'}</ul>
  `;
  root.querySelectorAll('.lesson-row').forEach(row=>{
    row.addEventListener('click', ()=>{
      state.currentLessonIndex = parseInt(row.dataset.idx,10);
      navigateTo('lesson', { moduleId, idx: state.currentLessonIndex });
    });
  });
  root.querySelectorAll('[data-nav]').forEach(b=> b.addEventListener('click', ()=>navigateTo(b.dataset.nav)));

// ============================================
// LESSON VIEW
// ============================================
function renderLesson({ moduleId, idx }){
  const m = state.modules.find(x=>x.id===moduleId);
  const root = document.getElementById('screen-lesson');
  if (!m || !root) { navigateTo('modules'); return; }
  const lessons = m.lessons || [];
  const lesson = lessons[idx];
  if (!lesson){ navigateTo('module-detail', moduleId); return; }
  const isLast = idx >= lessons.length-1;
  const isFirst = idx <= 0;

  root.innerHTML = `
    <div class="page-head">
      <button class="btn btn-ghost" id="back-to-mod">← ${escapeHtml(m.title)}</button>
      <h2>${escapeHtml(lesson.title)}</h2>
    </div>
    <article class="lesson-body">${lesson.body}</article>
    <div class="lesson-nav">
      <button class="btn" id="prev-lesson" ${isFirst?'disabled':''}>← Sebelumnya</button>
      <button class="btn btn-primary" id="done-lesson">✅ Tandai Selesai</button>
      <button class="btn" id="next-lesson" ${isLast?'disabled':''}>Berikutnya →</button>
    </div>
  `;
  document.getElementById('back-to-mod').onclick = ()=> navigateTo('module-detail', moduleId);
  document.getElementById('prev-lesson').onclick = ()=> navigateTo('lesson', { moduleId, idx: idx-1 });
  document.getElementById('next-lesson').onclick = ()=> navigateTo('lesson', { moduleId, idx: idx+1 });
  document.getElementById('done-lesson').onclick = async ()=>{
    await saveLessonDone(moduleId, lesson.id);
    showToast('Pelajaran ditandai selesai ✨','success');
    if (!isLast) navigateTo('lesson', { moduleId, idx: idx+1 });
    else navigateTo('module-detail', moduleId);
  };
}

// ============================================
// BASELINE — Asesmen Awal (ringkas)
// ============================================
let _baselineSession = null;
function renderBaseline(){
  const root = document.getElementById('screen-baseline');
  if (!root) return;
  if (!_baselineSession){
    const qs = shuffle(BASELINE_QUESTIONS.map(q=>({
      ...q,
      _opts: shuffleOptions(q.options, q.correct)
    })));
    _baselineSession = { idx:0, questions: qs, answers: new Array(qs.length).fill(null), startedAt: Date.now() };
  }
  const s = _baselineSession;
  const q = s.questions[s.idx];
  const total = s.questions.length;
  root.innerHTML = `
    <div class="page-head">
      <button class="btn btn-ghost" id="bl-back">← Dashboard</button>
      <h2>Asesmen Awal</h2>
    </div>
    <div class="muted">Soal ${s.idx+1} dari ${total}</div>
    <div class="progress"><div class="progress-bar" style="width:${Math.round((s.idx)*100/total)}%"></div></div>
    <div class="quiz-card">
      <p class="q-text">${escapeHtml(q.q)}</p>
      <div class="q-opts">
        ${q._opts.map((o,i)=>`
          <button class="quiz-opt ${s.answers[s.idx]===i?'selected':''}" data-i="${i}">${String.fromCharCode(65+i)}. ${escapeHtml(o.text)}</button>
        `).join('')}
      </div>
      <div class="quiz-nav">
        <button class="btn" id="bl-prev" ${s.idx===0?'disabled':''}>← Sebelumnya</button>
        ${s.idx===total-1
          ? `<button class="btn btn-primary" id="bl-submit">Selesai →</button>`
          : `<button class="btn btn-primary" id="bl-next">Berikutnya →</button>`}
      </div>
    </div>`;
  root.querySelectorAll('.quiz-opt').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      s.answers[s.idx] = parseInt(btn.dataset.i,10);
      renderBaseline();
    });
  });
  document.getElementById('bl-back')?.addEventListener('click', ()=>{ _baselineSession=null; navigateTo('dashboard'); });
  document.getElementById('bl-prev')?.addEventListener('click', ()=>{ if (s.idx>0){ s.idx--; renderBaseline(); } });
  document.getElementById('bl-next')?.addEventListener('click', ()=>{ if (s.idx<total-1){ s.idx++; renderBaseline(); } });
  document.getElementById('bl-submit')?.addEventListener('click', submitBaseline);
}

async function submitBaseline(){
  const s = _baselineSession; if (!s) return;
  let score = 0;
  const detailed = s.questions.map((q,i)=>{
    const selIdx = s.answers[i];
    const selOpt = selIdx!=null ? q._opts[selIdx] : null;
    const correct = selOpt ? selOpt.isCorrect : false;
    if (correct) score++;
    return { qid:q.id, selectedText: selOpt?.text||null, correct };
  });
  const result = { score, total:s.questions.length, answers:detailed, timestamp: Date.now() };
  // Simpan ke progress.baseline
  await db.collection('progress').doc(state.user.uid).set({ baseline: result, updatedAt: serverTime() }, { merge:true });
  state.baselineResult = result;
  _baselineSession = null;
  navigateTo('result', { type:'baseline', result });
}

// ============================================
// ASESMEN AKHIR — 20 Soal A–E
// ============================================
let _finalSession = null;
function renderAssessment(){
  const root = document.getElementById('screen-assessment');
  if (!root) return;
  if (!_finalSession){
    const qs = shuffle(FINAL_ASSESSMENT_QUESTIONS.map(q=>({
      ...q,
      _opts: shuffleOptions(q.options, q.correct)
    })));
    _finalSession = { idx:0, questions: qs, answers: new Array(qs.length).fill(null), startedAt: Date.now() };
  }
  const s = _finalSession;
  const q = s.questions[s.idx];
  const total = s.questions.length;
  const answered = s.answers.filter(x=>x!=null).length;

  root.innerHTML = `
    <div class="page-head">
      <button class="btn btn-ghost" id="as-back">← Dashboard</button>
      <h2>Asesmen Akhir</h2>
    </div>
    <div class="muted">Soal ${s.idx+1} dari ${total} · Terjawab ${answered}/${total}</div>
    <div class="progress"><div class="progress-bar" style="width:${Math.round((s.idx)*100/total)}%"></div></div>
    <div class="quiz-card">
      <div class="q-tags"><span class="tag">${q.tp||''}</span> <span class="tag tag-alt">${q.bloom||''}</span></div>
      <p class="q-text">${escapeHtml(q.q)}</p>
      <div class="q-opts">
        ${q._opts.map((o,i)=>`
          <button class="quiz-opt ${s.answers[s.idx]===i?'selected':''}" data-i="${i}">${String.fromCharCode(65+i)}. ${escapeHtml(o.text)}</button>
        `).join('')}
      </div>
      <div class="quiz-nav">
        <button class="btn" id="as-prev" ${s.idx===0?'disabled':''}>← Sebelumnya</button>
        ${s.idx===total-1
          ? `<button class="btn btn-primary" id="as-submit">Kumpulkan →</button>`
          : `<button class="btn btn-primary" id="as-next">Berikutnya →</button>`}
      </div>
      <div class="q-jump">
        ${s.questions.map((_,i)=>`<button class="jump ${i===s.idx?'active':''} ${s.answers[i]!=null?'done':''}" data-j="${i}">${i+1}</button>`).join('')}
      </div>
    </div>`;
  root.querySelectorAll('.quiz-opt').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      s.answers[s.idx] = parseInt(btn.dataset.i,10);
      renderAssessment();
    });
  });
  root.querySelectorAll('.jump').forEach(b=>{
    b.addEventListener('click', ()=>{ s.idx = parseInt(b.dataset.j,10); renderAssessment(); });
  });
  document.getElementById('as-back')?.addEventListener('click', ()=>{
    if (confirm('Keluar dari asesmen? Jawaban belum disimpan.')){ _finalSession=null; navigateTo('dashboard'); }
  });
  document.getElementById('as-prev')?.addEventListener('click', ()=>{ if (s.idx>0){ s.idx--; renderAssessment(); } });
  document.getElementById('as-next')?.addEventListener('click', ()=>{ if (s.idx<total-1){ s.idx++; renderAssessment(); } });
  document.getElementById('as-submit')?.addEventListener('click', submitAssessment);
}

async function submitAssessment(){
  const s = _finalSession; if (!s) return;
  const unanswered = s.answers.filter(x=>x==null).length;
  if (unanswered>0 && !confirm(`Masih ada ${unanswered} soal yang belum dijawab. Tetap kumpulkan?`)) return;

  let score = 0;
  const detailed = s.questions.map((q,i)=>{
    const selIdx = s.answers[i];
    const selOpt = selIdx!=null ? q._opts[selIdx] : null;
    const correctOpt = q._opts.find(o=>o.isCorrect);
    const correct = selOpt ? selOpt.isCorrect : false;
    if (correct) score++;
    return {
      qid: q.id, tp:q.tp, bloom:q.bloom,
      question: q.q,
      selectedText: selOpt?.text || null,
      correctText: correctOpt?.text || '',
      explanation: q.expl || '',
      allOptions: q._opts.map(o=>o.text),
      correct
    };
  });
  const total = s.questions.length;
  const percent = Math.round(score*100/total);
  const attempt = {
    userId: state.user.uid,
    userName: state.user.displayName,
    score, total, percent,
    startedAt: s.startedAt,
    completedAt: Date.now(),
    answers: detailed
  };

  // Simpan attempt (log lengkap) & final terbaru
  try {
    await db.collection('finalAttempts').add({ ...attempt, serverAt: serverTime() });
    const prevCount = (state.progress.finalAttemptsCount || 0) + 1;
    await db.collection('progress').doc(state.user.uid).set({
      final: attempt,
      finalAttemptsCount: prevCount,
      updatedAt: serverTime()
    }, { merge:true });
    state.finalResult = attempt;
    state.progress.finalAttemptsCount = prevCount;
  } catch(e){ console.error(e); showToast('Gagal menyimpan hasil','error'); }

  _finalSession = null;
  navigateTo('result', { type:'final', result: attempt });
}

// Util: bungkus options jadi { text, isCorrect }, lalu acak
function shuffleOptions(options, correctIdx){
  const arr = options.map((t,i)=>({ text:t, isCorrect: i===correctIdx }));
  return shuffle(arr);
}

// ============================================
function renderResult(payload){
  const root = document.getElementById('screen-result');
  if (!root || !payload) { navigateTo('dashboard'); return; }
  const r = payload.result;
  const isFinal = payload.type === 'final';
  const pct = r.percent ?? Math.round(r.score*100/r.total);
  const pass = pct >= 70;
  const mood = pass ? '🎉' : '💪';
  const grade = pct>=85?'A':pct>=75?'B':pct>=60?'C':pct>=50?'D':'E';

  root.innerHTML = `
    <div class="page-head">
      <button class="btn btn-ghost" data-nav="dashboard">← Dashboard</button>
      <h2>Hasil ${isFinal?'Asesmen Akhir':'Asesmen Awal'}</h2>
    </div>
    <section class="result-hero">
      <div class="result-score ${pass?'pass':'fail'}">
        <div class="rs-big">${pct}%</div>
        <div class="rs-sub">${r.score} / ${r.total} benar · Nilai ${grade} ${mood}</div>
      </div>
      <p class="muted">${pass
        ? 'Selamat! Kamu memenuhi standar minimum (≥ 70%).'
        : 'Belum memenuhi standar minimum. Boleh diulang — pelajari lagi modulnya ya.'}</p>
      <div class="result-actions">
        ${isFinal ? `<button class="btn btn-primary" id="btn-review">📘 LIHAT PEMBAHASAN</button>` : ''}
        <button class="btn" data-nav="${isFinal?'assessment':'baseline'}">🔁 Ulangi</button>
        <button class="btn btn-ghost" data-nav="dashboard">Selesai</button>
      </div>
    </section>
    <section id="review-box" class="review-box hidden"></section>
  `;
  root.querySelectorAll('[data-nav]').forEach(b=> b.addEventListener('click', ()=>navigateTo(b.dataset.nav)));
  if (isFinal){
    document.getElementById('btn-review')?.addEventListener('click', ()=>{
      const rb = document.getElementById('review-box');
      rb.classList.remove('hidden');
      rb.innerHTML = renderReview(r);
      rb.scrollIntoView({ behavior:'smooth' });
    });
  }
}

function renderReview(r){
  const items = (r.answers||[]).map((a,i)=>`
    <div class="review-item ${a.correct?'ok':'no'}">
      <div class="ri-head">
        <span class="ri-num">${i+1}</span>
        <span class="tag">${a.tp||''}</span>
        <span class="tag tag-alt">${a.bloom||''}</span>
        <span class="ri-flag">${a.correct?'✅ Benar':'❌ Salah'}</span>
      </div>
      <p class="ri-q">${escapeHtml(a.question||'')}</p>
      <ul class="ri-opts">
        ${(a.allOptions||[]).map(t=>{
          const isSel = (t===a.selectedText);
          const isCor = (t===a.correctText);
          const cls = isCor ? 'cor' : (isSel ? 'sel' : '');
          return `<li class="${cls}">${escapeHtml(t)}${isCor?' ✔️':''}${isSel && !isCor?' ← jawabanmu':''}</li>`;
        }).join('')}
      </ul>
      ${a.explanation ? `<div class="ri-expl"><strong>Pembahasan:</strong> ${markdownInline(a.explanation)}</div>` : ''}
    </div>`).join('');
  return `<h3>📘 Pembahasan Soal</h3>${items}`;
}

// Mini-markdown: **bold**, *italic*, `code`
function markdownInline(s){
  let t = escapeHtml(s);
  t = t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  t = t.replace(/\*(.+?)\*/g,'<em>$1</em>');
  t = t.replace(/`(.+?)`/g,'<code>$1</code>');
  return t;
}

  });
  root.querySelectorAll('[data-nav]').forEach(b=> b.addEventListener('click', ()=>navigateTo(b.dataset.nav)));
}

function computeStudentProgress(p){
  const mods = (state.modules.length ? state.modules : DEFAULT_MODULES).filter(m=>m.type==='content');
  let total=0, done=0;
  mods.forEach(m=>{
    (m.lessons||[]).forEach(l=>{
      total++;
      if (p[m.id] && p[m.id][l.id]) done++;
    });
  });
  return { total, done, percent: total? Math.round(done*100/total):0 };
}

// ============================================
// EXPORT CSV
// ============================================
function csvEscape(v){
  if (v==null) return '';
  const s = String(v);
  if (/[",\n]/.test(s)) return '"'+s.replace(/"/g,'""')+'"';
  return s;
}
function downloadCsv(filename, rows){
  const csv = rows.map(r=>r.map(csvEscape).join(',')).join('\n');
  const blob = new Blob(['\ufeff'+csv], { type:'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
function exportStudentsCsv(students, progressMap){
  const rows = [['Nama','Email','Pelajaran Selesai','Total Pelajaran','% Belajar','Asesmen Awal','Asesmen Akhir %','Jumlah Percobaan']];
  students.forEach(u=>{
    const p = progressMap[u.uid] || {};
    const prog = computeStudentProgress(p);
    rows.push([
      u.name||'', u.email||'',
      prog.done, prog.total, prog.percent,
      p.baseline? `${p.baseline.score}/${p.baseline.total}`:'',
      p.final? p.final.percent : '',
      p.finalAttemptsCount||0
    ]);
  });
  downloadCsv('siswa-tktc-'+new Date().toISOString().slice(0,10)+'.csv', rows);
  showToast('CSV siswa diunduh','success');
}
function exportAttemptsCsv(user, attempts){
  const rows = [['Siswa','Tanggal','Skor','Total','%','Durasi (detik)']];
  attempts.forEach(a=>{
    rows.push([
      a.userName||user.name||'-',
      new Date(a.completedAt||0).toISOString(),
      a.score, a.total, a.percent,
      Math.round(((a.completedAt||0)-(a.startedAt||0))/1000)
    ]);
  });
  downloadCsv('asesmen-'+(user.name||'siswa').replace(/\s+/g,'_')+'-'+new Date().toISOString().slice(0,10)+'.csv', rows);
  showToast('CSV percobaan diunduh','success');
}

function showToast(msg, type='info'){
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(()=>toast.remove(), 3500);
}
