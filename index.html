<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TKTC Kartini — SMKN Ile Boleng</title>
<link rel="manifest" href="./manifest.json">

<!-- Firebase SDK (Compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
/* ============================================
   VARIABLES & RESET
   ============================================ */
:root {
  --primary: #6C63FF;
  --primary-dark: #5A52D5;
  --primary-light: #8B83FF;
  --secondary: #FF6584;
  --accent: #00D2FF;
  --bg-dark: #0F0E17;
  --bg-card: #1A1A2E;
  --bg-card-hover: #222244;
  --bg-surface: #16213E;
  --text-primary: #EAEAEA;
  --text-secondary: #A0A0B0;
  --text-muted: #6C6C80;
  --success: #00C853;
  --warning: #FFB300;
  --danger: #FF5252;
  --info: #29B6F6;
  --radius: 16px;
  --radius-sm: 10px;
  --radius-xs: 6px;
  --shadow: 0 8px 32px rgba(0,0,0,0.3);
  --shadow-sm: 0 4px 16px rgba(0,0,0,0.2);
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font);
  background: var(--bg-dark);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-dark); }
::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }

.hidden { display: none !important; }
.text-center { text-align: center; }
.btn-block { width: 100%; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}
.animate-fade { animation: fadeIn 0.5s ease-out; }

/* BUTTONS */
.btn {
  padding: 12px 24px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  text-decoration: none;
  font-family: var(--font);
  background: var(--bg-card);
  color: var(--text-primary);
  border: 1px solid rgba(255,255,255,0.08);
}
.btn:hover { background: var(--bg-card-hover); }
.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  border: none;
  box-shadow: 0 4px 15px rgba(108,99,255,0.4);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(108,99,255,0.6); }
.btn-secondary { background: var(--bg-card); color: var(--text-primary); }
.btn-danger  { background: linear-gradient(135deg, var(--danger), #D32F2F); color: white; border: none; }
.btn-success { background: linear-gradient(135deg, var(--success), #00A844); color: white; border: none; }
.btn-warning { background: linear-gradient(135deg, var(--warning), #FF8F00); color: white; border: none; }
.btn-info    { background: linear-gradient(135deg, var(--info), #0288D1); color: white; border: none; }
.btn-ghost   { background: transparent; border: none; color: var(--text-secondary); }
.btn-ghost:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* FORMS */
.form-group { margin-bottom: 18px; }
.form-group label {
  display: block; margin-bottom: 8px;
  font-size: 13px; font-weight: 500; color: var(--text-secondary);
}
.form-input, .input {
  width: 100%;
  padding: 12px 16px;
  background: var(--bg-surface);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 14px;
  font-family: var(--font);
  transition: var(--transition);
}
.form-input:focus, .input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(108,99,255,0.2);
}
.form-input::placeholder { color: var(--text-muted); }
select.form-input { cursor: pointer; }

/* AUTH SCREEN */
#auth-screen, #pending-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: linear-gradient(135deg, #0F0E17 0%, #1A1A2E 50%, #16213E 100%);
  position: relative;
  overflow: hidden;
}
.auth-container { width: 100%; max-width: 420px; position: relative; z-index: 1; }
.auth-logo { text-align: center; margin-bottom: 36px; }
.auth-logo .logo-icon {
  width: 72px; height: 72px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 36px;
  margin: 0 auto 16px;
  box-shadow: 0 8px 32px rgba(108,99,255,0.3);
}
.auth-logo h1 {
  font-size: 26px; font-weight: 700;
  background: linear-gradient(135deg, var(--text-primary), var(--primary-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.auth-logo p { color: var(--text-secondary); font-size: 13px; margin-top: 4px; }
.auth-card {
  background: rgba(26,26,46,0.8);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius);
  padding: 28px;
  box-shadow: var(--shadow);
}
.auth-tabs {
  display: flex;
  background: var(--bg-surface);
  border-radius: var(--radius-sm);
  padding: 4px;
  margin-bottom: 22px;
}
.auth-tab {
  flex: 1; padding: 9px;
  text-align: center;
  border-radius: var(--radius-xs);
  cursor: pointer;
  font-size: 13px; font-weight: 600;
  color: var(--text-muted);
  transition: var(--transition);
  border: none; background: none;
  font-family: var(--font);
}
.auth-tab.active { background: var(--primary); color: white; }
.auth-msg {
  padding: 10px 14px;
  border-radius: var(--radius-xs);
  font-size: 13px;
  margin-bottom: 14px;
  display: none;
}
.auth-msg.error { display: block; background: rgba(255,82,82,0.15); color: var(--danger); border: 1px solid rgba(255,82,82,0.3); }
.auth-msg.success { display: block; background: rgba(0,200,83,0.15); color: var(--success); border: 1px solid rgba(0,200,83,0.3); }
.auth-msg.info { display: block; background: rgba(108,99,255,0.15); color: var(--primary-light); border: 1px solid rgba(108,99,255,0.3); }

/* APP SHELL */
#app-screen { min-height: 100vh; padding-bottom: 80px; }
.app-header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(15,14,23,0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  padding: 12px 16px;
}
.header-inner {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
  max-width: 1200px;
  margin: 0 auto;
}
.header-title {
  font-size: 16px; font-weight: 700;
  flex: 1; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap;
}
.header-user {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg-card);
  padding: 6px 14px;
  border-radius: 24px;
  font-size: 13px;
  cursor: pointer;
}
.back-btn {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: var(--bg-card);
  border: none;
  color: var(--text-primary);
  font-size: 18px;
  cursor: pointer;
}
.page-content { max-width: 1200px; margin: 0 auto; padding: 20px 16px; }
.page-head {
  display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
}
.page-head h2 { font-size: 22px; font-weight: 700; }

/* BOTTOM NAV */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(15,14,23,0.95);
  backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255,255,255,0.05);
  display: flex; justify-content: space-around;
  padding: 8px 4px calc(8px + env(safe-area-inset-bottom));
  z-index: 100;
}
.nav-item {
  flex: 1; max-width: 90px;
  display: flex; flex-direction: column;
  align-items: center; gap: 4px;
  padding: 6px 4px;
  border-radius: 10px;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 11px; font-weight: 600;
  background: none; border: none;
  transition: var(--transition);
  font-family: var(--font);
}
.nav-item .nav-icon { font-size: 22px; line-height: 1; }
.nav-item.active { color: var(--primary-light); }

/* CARDS & PROGRESS */
.card {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 20px;
  border: 1px solid rgba(255,255,255,0.05);
  transition: var(--transition);
}
.card-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.card-big { font-size: 32px; font-weight: 700; margin-bottom: 8px; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
.progress {
  height: 8px; background: rgba(255,255,255,0.1);
  border-radius: 4px; overflow: hidden; margin: 8px 0;
}
.progress.small { height: 6px; }
.progress-bar {
  height: 100%; border-radius: 4px;
  transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  background: linear-gradient(90deg, var(--primary), var(--accent));
}
.muted { color: var(--text-muted); font-size: 13px; }
.error { color: var(--danger); padding: 16px; background: rgba(255,82,82,0.1); border-radius: var(--radius-sm); }

.hero { margin-bottom: 24px; }
.hero h2 { font-size: 26px; font-weight: 700; margin-bottom: 6px; }
.hero p { color: var(--text-secondary); }
.quick-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }

/* MODULE CARDS */
.module-grid { display: flex; flex-direction: column; gap: 14px; }
.module-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 18px;
  border: 1px solid rgba(255,255,255,0.05);
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  gap: 16px;
  align-items: flex-start;
}
.module-card:hover { transform: translateY(-2px); border-color: rgba(108,99,255,0.4); box-shadow: var(--shadow-sm); }
.mc-icon {
  width: 54px; height: 54px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  flex-shrink: 0;
}
.mc-body { flex: 1; min-width: 0; }
.mc-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.mc-tp { font-size: 11px; color: var(--primary-light); font-weight: 600; margin-bottom: 6px; letter-spacing: 0.5px; }
.mc-desc { font-size: 13px; color: var(--text-secondary); margin-bottom: 10px; line-height: 1.5; }

.badge, .tag {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  background: rgba(108,99,255,0.2);
  color: var(--primary-light);
}
.tag-alt { background: rgba(0,210,255,0.2); color: var(--accent); }

/* LESSON LIST & BODY */
.lesson-list { list-style: none; display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
.lesson-row {
  display: flex; align-items: center; gap: 14px;
  background: var(--bg-card);
  padding: 14px 16px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: var(--transition);
}
.lesson-row:hover { background: var(--bg-card-hover); }
.lr-num {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--primary);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: white;
}
.lr-title { flex: 1; font-weight: 500; }
.lr-status { font-size: 18px; }
.lesson-body {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 24px;
  line-height: 1.8;
}
.lesson-body h3 { font-size: 20px; margin: 24px 0 12px; color: var(--primary-light); }
.lesson-body h4 { font-size: 16px; margin: 20px 0 10px; color: var(--accent); }
.lesson-body p { margin-bottom: 14px; font-size: 15px; }
.lesson-body ul, .lesson-body ol { margin: 12px 0 14px 24px; }
.lesson-body li { margin-bottom: 6px; font-size: 15px; }
.lesson-body strong { color: var(--primary-light); font-weight: 600; }
.lesson-body em { color: var(--accent); font-style: italic; }
.lesson-body blockquote {
  border-left: 3px solid var(--primary);
  padding: 10px 16px;
  background: rgba(108,99,255,0.08);
  border-radius: 8px;
  margin: 14px 0;
  color: var(--text-secondary);
}
.lesson-body code {
  background: rgba(108,99,255,0.15);
  padding: 2px 8px;
  border-radius: 4px;
  color: var(--primary-light);
  font-family: 'Consolas', monospace;
  font-size: 14px;
}
.lesson-nav { display: flex; justify-content: space-between; gap: 10px; margin-top: 20px; flex-wrap: wrap; }

/* QUIZ */
.quiz-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 22px;
  margin-top: 12px;
}
.q-tags { display: flex; gap: 6px; margin-bottom: 10px; }
.q-text { font-size: 17px; font-weight: 600; margin-bottom: 18px; line-height: 1.5; }
.q-opts { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }
.quiz-opt {
  padding: 13px 15px;
  background: var(--bg-surface);
  border: 2px solid transparent;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: var(--transition);
  text-align: left;
  font-family: var(--font);
  color: var(--text-primary);
  font-size: 14px;
  line-height: 1.5;
}
.quiz-opt:hover { border-color: var(--primary); background: rgba(108,99,255,0.1); }
.quiz-opt.selected { border-color: var(--primary); background: rgba(108,99,255,0.2); }
.quiz-nav { display: flex; justify-content: space-between; gap: 10px; }
.q-jump {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-top: 16px; padding-top: 16px;
  border-top: 1px solid rgba(255,255,255,0.05);
}
.jump {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: var(--bg-surface);
  color: var(--text-muted);
  border: 1px solid rgba(255,255,255,0.08);
  cursor: pointer;
  font-size: 12px; font-weight: 600;
}
.jump.done { background: rgba(0,200,83,0.2); color: var(--success); }
.jump.active { background: var(--primary); color: white; border-color: var(--primary); }

/* RESULT */
.result-hero { text-align: center; padding: 28px 20px; }
.result-score .rs-big {
  font-size: 56px; font-weight: 800;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.result-score.fail .rs-big {
  background: linear-gradient(135deg, var(--warning), var(--danger));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.result-score .rs-sub { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }
.result-actions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 18px; }
.review-box { margin-top: 24px; }
.review-box h3 { margin-bottom: 14px; }
.review-item {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  border-left: 4px solid var(--success);
}
.review-item.no { border-left-color: var(--danger); }
.ri-head { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
.ri-num {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--primary); color: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
}
.ri-flag { margin-left: auto; font-size: 13px; font-weight: 600; }
.ri-q { font-weight: 600; margin-bottom: 10px; line-height: 1.5; }
.ri-opts { list-style: none; display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
.ri-opts li {
  padding: 8px 12px;
  border-radius: var(--radius-xs);
  background: var(--bg-surface);
  font-size: 13px;
}
.ri-opts li.cor { background: rgba(0,200,83,0.15); color: var(--success); font-weight: 600; }
.ri-opts li.sel { background: rgba(255,82,82,0.15); color: var(--danger); }
.ri-expl {
  background: rgba(108,99,255,0.08);
  padding: 10px 12px;
  border-radius: var(--radius-xs);
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
}
.ri-expl strong { color: var(--primary-light); }

/* GLOSARIUM */
.gloss-count { margin: 8px 0 12px; }
.gloss-list { display: flex; flex-direction: column; gap: 10px; }
.gloss-item {
  background: var(--bg-card);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  border-left: 3px solid var(--primary);
}
.gi-term { font-size: 15px; font-weight: 700; color: var(--primary-light); margin-bottom: 4px; }
.gi-def { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
.gi-def code { background: rgba(108,99,255,0.15); padding: 1px 6px; border-radius: 4px; color: var(--primary-light); font-size: 12px; }
.gi-tp { margin-top: 8px; }

/* ADMIN */
.admin-tabs { display: flex; gap: 6px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 4px; }
.admin-tabs .tab, .tab {
  padding: 8px 14px;
  background: var(--bg-card);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  color: var(--text-secondary);
  font-size: 13px; font-weight: 600;
  cursor: pointer; white-space: nowrap;
  font-family: var(--font);
}
.tab.active { background: var(--primary); color: white; border-color: var(--primary); }
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th, .data-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
.data-table thead th { background: var(--bg-surface); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary); }
.table-wrap { overflow-x: auto; background: var(--bg-card); border-radius: var(--radius); }
.toolbar { display: flex; gap: 10px; margin-bottom: 14px; align-items: center; flex-wrap: wrap; }

/* TOAST */
.toast {
  position: fixed;
  bottom: calc(90px + env(safe-area-inset-bottom));
  left: 50%; transform: translateX(-50%);
  padding: 12px 20px;
  border-radius: 24px;
  font-size: 14px; font-weight: 500;
  z-index: 2000;
  box-shadow: var(--shadow);
  animation: slideUp 0.25s ease-out;
  max-width: 90vw;
}
.toast-success { background: var(--success); color: white; }
.toast-error { background: var(--danger); color: white; }
.toast-info { background: var(--info); color: white; }

/* LOADING OVERLAY */
#loading-overlay {
  position: fixed; inset: 0;
  background: var(--bg-dark);
  z-index: 9999;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px;
}
.spinner {
  width: 48px; height: 48px;
  border: 4px solid rgba(108,99,255,0.2);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* RESPONSIVE */
@media (max-width: 480px) {
  .page-head h2 { font-size: 18px; }
  .card-big { font-size: 26px; }
  .auth-card { padding: 22px 18px; }
  .lesson-body { padding: 18px; }
  .quiz-card { padding: 16px; }
}
</style>
</head>

<body>

<!-- Loading Overlay -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <p style="color:var(--text-secondary);font-size:14px;">Memuat TKTC Kartini…</p>
</div>

<!-- Auth Screen -->
<div id="auth-screen" class="hidden">
  <div class="auth-container">
    <div class="auth-logo">
      <div class="logo-icon">🎬</div>
      <h1>TKTC Kartini</h1>
      <p>Tata Kamera & Tata Cahaya — SMKN Ile Boleng</p>
    </div>
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" id="to-login" type="button">Masuk</button>
        <button class="auth-tab" id="to-register" type="button">Daftar</button>
      </div>
      <div id="auth-msg" class="auth-msg"></div>

async function dbPut(collection, id, data) {
  await db.collection(collection).doc(String(id)).set(data, { merge: false });
}
async function dbMerge(collection, id, data) {
  await db.collection(collection).doc(String(id)).set(data, { merge: true });
}
async function dbGet(collection, id) {
  const snap = await db.collection(collection).doc(String(id)).get();
  return snap.exists ? snap.data() : null;
}
async function dbGetAll(collection) {
  const snap = await db.collection(collection).get();
  return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}
async function dbDelete(collection, id) {
  await db.collection(collection).doc(String(id)).delete();
}

// ============================================

function nowIso() { return new Date().toISOString(); }
function fmtDate(iso) {
  if (!iso) return '—';
  const d = typeof iso === 'number' ? new Date(iso) : (iso?.toDate ? iso.toDate() : new Date(iso));
  return d.toLocaleDateString('id-ID', { day:'2-digit', month:'short', year:'numeric' })
    + ' ' + d.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' });
}
function escapeHtml(str) {
  if (str == null) return '';
  return String(str).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
// Bungkus options jadi { text, isCorrect } lalu acak
function shuffleOptions(options, correctIdx){
  const arr = options.map((t,i) => ({ text:t, isCorrect: i===correctIdx }));
  return shuffle(arr);
}
// Mini-markdown untuk pembahasan: **bold**, *italic*, `code`
function markdownInline(s){
  let t = escapeHtml(s);
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*(.+?)\*/g, '<em>$1</em>');
  t = t.replace(/`(.+?)`/g, '<code>$1</code>');
  return t;
}

// ============================================
// UI HELPERS
// ============================================
function $(sel) { return document.querySelector(sel); }
function $$(sel) { return Array.from(document.querySelectorAll(sel)); }

function showLoading(show = true) {
  const el = $('#loading-overlay');
  if (el) el.style.display = show ? 'flex' : 'none';
}

function toast(msg, type = 'info') {
  const t = document.createElement('div');
  t.className = 'toast toast-' + type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2600);
}

function setAuthMsg(msg, type) {
  const el = $('#auth-msg');
  if (!el) return;
  el.className = 'auth-msg' + (type ? ' ' + type : '');
  el.textContent = msg || '';
  if (!msg) el.style.display = 'none';
}

function showScreen(name) {
  // Sembunyikan semua kontainer auth-level
  ['auth-screen','pending-screen','app-screen'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.add('hidden');
  });
  const target = document.getElementById(name);
  if (target) target.classList.remove('hidden');
}

function switchTab(name) {
  const isLogin = name === 'login';
  $('#to-login')?.classList.toggle('active', isLogin);
  $('#to-register')?.classList.toggle('active', !isLogin);
  $('#login-form')?.classList.toggle('hidden', !isLogin);
  $('#register-form')?.classList.toggle('hidden', isLogin);
  setAuthMsg('');
}

// ============================================
// AUTH — REGISTER + LOGIN
// ============================================
async function handleRegister(e) {
  e.preventDefault();
  setAuthMsg('');

  const name = $('#reg-name').value.trim();
  const email = $('#reg-email').value.trim().toLowerCase();
  const pass = $('#reg-pass').value;

  if (!name || !email || !pass) {
    setAuthMsg('Mohon lengkapi semua kolom.', 'error'); return;
  }
  if (pass.length < 6) {
    setAuthMsg('Kata sandi minimal 6 karakter.', 'error'); return;
  }

  const btn = e.target.querySelector('button[type=submit]');
  btn.disabled = true; btn.textContent = 'Memproses…';

  try {
    // 1. Buat akun Firebase Auth
    const cred = await firebase.auth().createUserWithEmailAndPassword(email, pass);
    const uid = cred.user.uid;

    // 2. Tentukan role + status berdasarkan whitelist
    const isAdmin = isAdminEmail(email);
    const userDoc = {
      uid,
      name,
      email,
      role:   isAdmin ? 'guru' : 'siswa',
      status: isAdmin ? 'approved' : 'pending',
      createdAt: serverTime(),
      approvedAt: isAdmin ? serverTime() : null,
      approvedBy: isAdmin ? 'auto-whitelist' : null
    };

    // 3. Simpan dokumen user
    await dbPut('users', uid, userDoc);

    setAuthMsg(isAdmin
      ? 'Akun Guru berhasil dibuat. Mengarahkan…'
      : 'Akun dibuat. Menunggu persetujuan Guru.', 'success');
    // onAuthStateChanged akan mengambil alih dari sini
  } catch (err) {
    let msg = 'Gagal mendaftar.';
    if (err.code === 'auth/email-already-in-use') msg = 'Email sudah terdaftar. Silakan masuk.';
    else if (err.code === 'auth/invalid-email') msg = 'Format email tidak valid.';
    else if (err.code === 'auth/weak-password') msg = 'Kata sandi terlalu lemah.';
    else if (err.code === 'auth/network-request-failed') msg = 'Jaringan bermasalah. Coba lagi.';
    else msg = err.message || msg;
    setAuthMsg(msg, 'error');
    btn.disabled = false; btn.textContent = 'Daftar';
  }
}

async function handleLogin(e) {
  e.preventDefault();
  setAuthMsg('');

  const email = $('#login-email').value.trim().toLowerCase();
  const pass = $('#login-pass').value;
  if (!email || !pass) { setAuthMsg('Mohon isi email & kata sandi.', 'error'); return; }

  const btn = e.target.querySelector('button[type=submit]');
  btn.disabled = true; btn.textContent = 'Memproses…';

  try {
    await firebase.auth().signInWithEmailAndPassword(email, pass);
    // onAuthStateChanged akan mengambil alih
  } catch (err) {
    let msg = 'Gagal masuk.';
    if (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found')
      msg = 'Email atau kata sandi salah.';
    else if (err.code === 'auth/too-many-requests') msg = 'Terlalu banyak percobaan. Coba beberapa menit lagi.';
    else if (err.code === 'auth/network-request-failed') msg = 'Jaringan bermasalah. Coba lagi.';
    else msg = err.message || msg;
    setAuthMsg(msg, 'error');
    btn.disabled = false; btn.textContent = 'Masuk';
  }
}

async function handleLogout() {
  try {
    await firebase.auth().signOut();
  } catch(_) {}
  state.currentUser = null;
  state.authUser = null;
  showScreen('auth-screen');
  switchTab('login');
  $('#login-form')?.reset();
  $('#register-form')?.reset();
}

function showPending(userDoc) {
  const iconEl = $('#pending-icon');
  const titleEl = $('#pending-title');
  const msgEl = $('#pending-message');
  const emailEl = $('#pending-email');

  if (userDoc.status === 'rejected') {
    iconEl.textContent = '⛔';
    titleEl.textContent = 'Akses Ditolak';
    msgEl.innerHTML = 'Pendaftaranmu <strong>tidak disetujui</strong> oleh Guru. Jika ini keliru, silakan hubungi Guru-mu.';
  } else {
    iconEl.textContent = '⏳';
    titleEl.textContent = 'Menunggu Persetujuan';
    msgEl.innerHTML = 'Akunmu sudah dibuat. <strong>Mohon tunggu</strong> Guru menyetujui pendaftaranmu sebelum dapat mengakses platform.';
  }
  emailEl.textContent = userDoc.email || '';
  showScreen('pending-screen');
  showLoading(false);
}

async function resolveUserAndRoute(authUser) {
  state.authUser = authUser;

  // Ambil dokumen user dari Firestore
  let userDoc = await dbGet('users', authUser.uid);

  // Fallback: dokumen user belum ada (mis. akun lama) → buatkan
  if (!userDoc) {
    const email = (authUser.email || '').toLowerCase();
    const isAdmin = isAdminEmail(email);
    userDoc = {
      uid: authUser.uid,
      name: authUser.displayName || email.split('@')[0],
      email,
      role: isAdmin ? 'guru' : 'siswa',
      status: isAdmin ? 'approved' : 'pending',
      createdAt: serverTime(),
      approvedAt: isAdmin ? serverTime() : null,
      approvedBy: isAdmin ? 'auto-whitelist' : null
    };
    await dbPut('users', authUser.uid, userDoc);
  } else {
    // Auto-upgrade jika email whitelist tapi role masih siswa
    const email = (authUser.email || userDoc.email || '').toLowerCase();
    if (isAdminEmail(email) && userDoc.role !== 'guru') {
      await dbMerge('users', authUser.uid, {
        role: 'guru', status: 'approved',
        approvedAt: serverTime(), approvedBy: 'auto-whitelist'
      });
      userDoc.role = 'guru';
      userDoc.status = 'approved';
    }
  }

  state.currentUser = userDoc;

  // Routing berdasarkan status
  if (userDoc.status !== 'approved') {
    showPending(userDoc);
    return;
  }

  // Status approved → masuk aplikasi
  await enterApp();
}

async function enterApp() {
  const u = state.currentUser;
  const roleLabel = u.role === 'guru' ? 'Guru' : 'Siswa';
  $('#user-info').innerHTML =
    `<span>👤</span><span>${escapeHtml(u.name)} • ${roleLabel}</span>`;
  $('#user-info').onclick = () => {
    if (confirm('Keluar dari akun?')) handleLogout();
  };

  // Tampilkan / sembunyikan menu Admin
  $$('.nav-item[data-role="guru"]').forEach(el =>
    el.classList.toggle('hidden', u.role !== 'guru'));

  showScreen('app-screen');
  showLoading(false);
  navigate('dashboard');
}

// ============================================
// NAVIGATION
// ============================================
function navigate(screen, opts = {}) {
  if (state.currentScreen && state.currentScreen !== screen) {
    state.history.push(state.currentScreen);
  }
  state.currentScreen = screen;

  // Tampilkan / sembunyikan kontainer screen-*
  ['dashboard','modules','module-detail','lesson','assessment','baseline','glosarium','admin','result']
    .forEach(id => {
      const el = $('#screen-' + id);
      if (el) el.classList.toggle('hidden', id !== screen);
    });

  // Tombol back & header title
  const titles = {
    dashboard:'Beranda', modules:'Modul', 'module-detail':'Detail Modul',
    lesson:'Materi', assessment:'Asesmen Akhir', baseline:'Asesmen Awal',
    glosarium:'Glosarium', admin:'Panel Admin', result:'Hasil'
  };
  $('#header-title').textContent = titles[screen] || '';
  $('#back-btn').classList.toggle('hidden', ['dashboard','modules','glosarium','admin'].includes(screen));

  // Update nav aktif
  $$('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.nav === screen);
  });

  // Render
  if (screen === 'dashboard')      renderDashboard();
  if (screen === 'modules')        renderModules();
  if (screen === 'module-detail')  renderModuleDetail(opts.moduleId || state.currentModuleId);
  if (screen === 'lesson')         renderLesson();
  if (screen === 'baseline')       startBaseline();
  if (screen === 'assessment')     startFinalAssessment();
  if (screen === 'glosarium')      renderGlosarium();
  if (screen === 'admin')          renderAdmin();

  window.scrollTo({top:0, behavior:'smooth'});
}

function goBack() {
  if (state.history.length === 0) { navigate('dashboard'); return; }
  const prev = state.history.pop();
  state.currentScreen = null;  // agar tidak dipush lagi
  navigate(prev);
}

// ============================================
// BINDING — dipanggil saat DOM siap
// ============================================
function bindStatic() {
  // Tabs auth
  $('#to-login').addEventListener('click', () => switchTab('login'));
  $('#to-register').addEventListener('click', () => switchTab('register'));

  // Forms auth
  $('#login-form').addEventListener('submit', handleLogin);
  $('#register-form').addEventListener('submit', handleRegister);

  // Pending
  $('#pending-logout').addEventListener('click', handleLogout);

  // Bottom nav
  $$('.bottom-nav .nav-item').forEach(el => {
    el.addEventListener('click', () => {
      const screen = el.dataset.nav;
      if (screen) navigate(screen);
    });
  });

  // Back
  $('#back-btn').addEventListener('click', goBack);
}

// ============================================
// BOOTSTRAP
// ============================================
document.addEventListener('DOMContentLoaded', () => {
  bindStatic();
  showLoading(true);

  firebase.auth().onAuthStateChanged(async (user) => {
    try {
      if (!user) {
        // Belum login
        state.currentUser = null;
        state.authUser = null;
        showScreen('auth-screen');
        switchTab('login');
        showLoading(false);
      } else {
        await resolveUserAndRoute(user);
      }
    } catch (err) {
      console.error('Auth route error:', err);
      toast('Gagal memuat akun. ' + (err.message || ''), 'error');
      showLoading(false);
      showScreen('auth-screen');
    }
  });
});

// ============================================
// DAFTAR MODUL
// ============================================
async function renderModules() {
  const u = state.currentUser;
  const root = $('#screen-modules');
  const progress = await dbGet('progress', u.uid) || { completed: [] };
  const completed = new Set(progress.completed || []);

  const cards = state.modules.map(m => {
    const total = m.lessons?.length || 0;
    const done = (m.lessons || []).filter(l => completed.has(l.id)).length;
    const pct = total ? Math.round((done/total)*100) : 0;
    const statusLine = m.type === 'baseline'
      ? (progress.baseline ? '<span class="tag">Selesai</span>' : '<span class="tag tag-alt">Mulai</span>')
      : m.type === 'final'
        ? '<span class="tag tag-alt">Asesmen</span>'
        : `<div class="progress small"><div class="progress-bar" style="width:${pct}%"></div></div>
           <div class="muted" style="margin-top:4px">${done}/${total} materi • ${m.estMin} menit</div>`;
    return `
      <div class="module-card" onclick="openModule('${m.id}')">
        <div class="mc-icon">${m.icon}</div>
        <div class="mc-body">
          <div class="mc-tp">${m.tp}</div>
          <div class="mc-title">${escapeHtml(m.title)}</div>
          <div class="mc-desc">${escapeHtml(m.desc)}</div>
          ${statusLine}
        </div>
      </div>`;
  }).join('');
  root.innerHTML = `<div class="module-grid">${cards}</div>`;
}

function openModule(id) {
  const m = state.modules.find(x => x.id === id);
  if (!m) return;
  state.currentModuleId = id;
  if (m.type === 'baseline') return navigate('baseline');
  if (m.type === 'final')    return navigate('assessment');
  navigate('module-detail', { moduleId: id });
}

// DETAIL MODUL
// ============================================
async function renderModuleDetail(moduleId) {

  const root = $('#screen-module-detail');

function openLesson(lessonId) {

  if (!m) return;
  const idx = m.lessons.findIndex(l => l.id === lessonId);
  if (idx < 0) return;
  state.currentLessonIdx = idx;
  navigate('lesson');
}

// ============================================
// LESSON
// ============================================
async function renderLesson() {
  const m = state.modules.find(x => x.id === state.currentModuleId);
  const root = $('#screen-lesson');
  if (!m) return;
  const idx = state.currentLessonIdx;
  const l = m.lessons[idx];
  if (!l) return;

  root.innerHTML = `
    <div class="page-head">
      <div>
        <div class="mc-tp">${m.tp} • Materi ${idx+1}/${m.lessons.length}</div>
        <h2>${escapeHtml(l.title)}</h2>
      </div>
    </div>
    <div class="lesson-body">${l.body}</div>
    <div class="lesson-nav">
      <button class="btn btn-secondary" ${idx===0?'disabled':''}
              onclick="state.currentLessonIdx--;renderLesson();window.scrollTo({top:0})">← Sebelumnya</button>
      <button class="btn btn-primary" onclick="completeLesson('${l.id}')">
        ${idx === m.lessons.length - 1 ? 'Selesai & Kembali' : 'Selanjutnya →'}
      </button>
    </div>`;
}

async function completeLesson(lessonId) {
  const u = state.currentUser;
  const progress = await dbGet('progress', u.uid) || { completed: [] };
  if (!progress.completed.includes(lessonId)) progress.completed.push(lessonId);
  progress.updatedAt = nowIso();
  await dbMerge('progress', u.uid, progress);
  toast('Materi ditandai selesai', 'success');

  const m = state.modules.find(x => x.id === state.currentModuleId);
  if (state.currentLessonIdx < m.lessons.length - 1) {
    state.currentLessonIdx++;
    renderLesson();
    window.scrollTo({top:0});
  } else {
    navigate('module-detail', { moduleId: m.id });
  }
}

// ============================================
// BASELINE (Asesmen Awal)
// ============================================
function startBaseline() {
  state.quiz = {
    mode: 'baseline',
    questions: BASELINE_QUESTIONS.map(q => ({
      ...q,
      shuffled: shuffleOptions(q.options, q.answer)
    })),
    cur: 0,
    answers: {} // id -> index terpilih di shuffled
  };
  renderQuiz('#screen-baseline');
}

function startFinalAssessment() {
  const u = state.currentUser;
  // Syarat 70% progres sebelum asesmen
  dbGet('progress', u.uid).then(p => {
    const progress = p || { completed: [] };
    const total = state.modules.filter(m => m.type==='content')
                    .reduce((s,m) => s + (m.lessons?.length || 0), 0);
    const pct = total ? (progress.completed?.length || 0) / total : 0;
    if (pct < 0.7 && u.role !== 'guru') {
      $('#screen-assessment').innerHTML = `
        <div class="error">
          Progres belajar kamu baru <strong>${Math.round(pct*100)}%</strong>.
          Selesaikan minimal <strong>70%</strong> materi sebelum mengerjakan Asesmen Akhir.
        </div>`;
      return;
    }
    state.quiz = {
      mode: 'final',
      questions: shuffle(FINAL_ASSESSMENT_QUESTIONS).map(q => ({
        ...q,
        shuffled: shuffleOptions(q.options, q.answer)
      })),
      cur: 0,
      answers: {}
    };
    renderQuiz('#screen-assessment');
  });
}

function renderQuiz(sel) {
  const root = $(sel);
  const q = state.quiz;
  const cur = q.questions[q.cur];
  const totalN = q.questions.length;

  const opts = cur.shuffled.map((o, i) => {
    const sel = q.answers[cur.id] === i ? ' selected' : '';
    const label = String.fromCharCode(65 + i);
    return `<button class="quiz-opt${sel}" onclick="selectAns('${cur.id}', ${i})">
              <strong>${label}.</strong> ${escapeHtml(o.text)}
            </button>`;
  }).join('');

  const jumps = q.questions.map((qq, i) => {
    const done = q.answers[qq.id] !== undefined;
    const active = i === q.cur;
    return `<button class="jump${active?' active':''}${done?' done':''}" onclick="gotoQ(${i})">${i+1}</button>`;
  }).join('');

  root.innerHTML = `
    <div class="page-head">
      <h2>${q.mode === 'baseline' ? 'Asesmen Awal' : 'Asesmen Akhir'}</h2>
      <span class="muted">Soal ${q.cur+1} dari ${totalN}</span>
    </div>
    <div class="quiz-card">
      <div class="q-tags">
        <span class="tag">${cur.tp}</span>
        <span class="tag tag-alt">Bloom ${cur.bloom}</span>
      </div>
      <div class="q-text">${escapeHtml(cur.q)}</div>
      <div class="q-opts">${opts}</div>
      <div class="quiz-nav">
        <button class="btn btn-secondary" ${q.cur===0?'disabled':''} onclick="gotoQ(${q.cur-1})">← Sebelumnya</button>
        ${q.cur < totalN-1
          ? `<button class="btn btn-primary" onclick="gotoQ(${q.cur+1})">Selanjutnya →</button>`
          : `<button class="btn btn-success" onclick="submitQuiz()">✅ Kumpulkan</button>`}
      </div>
      <div class="q-jump">${jumps}</div>
    </div>`;
}

function selectAns(qid, idx) {
  state.quiz.answers[qid] = idx;
  renderQuiz(state.quiz.mode === 'baseline' ? '#screen-baseline' : '#screen-assessment');
}
function gotoQ(i) {
  state.quiz.cur = i;
  renderQuiz(state.quiz.mode === 'baseline' ? '#screen-baseline' : '#screen-assessment');
}

async function submitQuiz() {
  const q = state.quiz;
  const totalN = q.questions.length;
  const unanswered = q.questions.filter(qq => q.answers[qq.id] === undefined).length;
  if (unanswered > 0) {
    if (!confirm(`Masih ada ${unanswered} soal yang belum dijawab. Kumpulkan sekarang?`)) return;
  }

  // Hitung skor
  let correct = 0;
  const review = q.questions.map(qq => {
    const selIdx = q.answers[qq.id];
    const isCorrect = selIdx !== undefined && qq.shuffled[selIdx]?.isCorrect;
    if (isCorrect) correct++;
    return {
      id: qq.id, q: qq.q, tp: qq.tp, bloom: qq.bloom, expl: qq.expl,
      shuffled: qq.shuffled,
      selIdx,
      isCorrect
    };
  });
  const score = Math.round((correct/totalN)*100);

  // Simpan hasil
  const u = state.currentUser;
  if (q.mode === 'baseline') {
    await dbMerge('progress', u.uid, { baseline: { score, at: nowIso() } });
  } else {
    const attemptId = u.uid + '_' + Date.now();
    await dbPut('finalAttempts', attemptId, {
      uid: u.uid, name: u.name, email: u.email,
      score, correct, total: totalN,
      at: nowIso(), review
    });
  }

  // Tampilkan result
  renderResult({ mode: q.mode, score, correct, total: totalN, review });
  state.quiz = null;
}

// ============================================
// RESULT
// ============================================
function renderResult({ mode, score, correct, total, review }) {
  const root = $('#screen-result');
  const pass = score >= 70;
  const items = review.map((r, i) => {
    const opts = r.shuffled.map((o, idx) => {
      const letter = String.fromCharCode(65 + idx);
      const cls = o.isCorrect ? 'cor' : (idx === r.selIdx ? 'sel' : '');
      return `<li class="${cls}"><strong>${letter}.</strong> ${escapeHtml(o.text)}</li>`;
    }).join('');
    return `
      <div class="review-item ${r.isCorrect?'ok':'no'}">
        <div class="ri-head">
          <div class="ri-num">${i+1}</div>
          <span class="tag">${r.tp}</span>
          <span class="tag tag-alt">Bloom ${r.bloom}</span>
          <span class="ri-flag" style="color:${r.isCorrect?'var(--success)':'var(--danger)'}">
            ${r.isCorrect ? '✓ Benar' : (r.selIdx === undefined ? '— Tidak dijawab' : '✗ Salah')}
          </span>
        </div>
        <div class="ri-q">${escapeHtml(r.q)}</div>
        <ul class="ri-opts">${opts}</ul>
        <div class="ri-expl"><strong>Pembahasan:</strong> ${markdownInline(r.expl)}</div>
      </div>`;
  }).join('');

  root.innerHTML = `
    <div class="result-hero">
      <div class="result-score ${pass?'ok':'fail'}">
        <div class="rs-big">${score}%</div>
        <div class="rs-sub">${correct} dari ${total} soal benar</div>
      </div>
      <h2 style="margin-top:14px">${pass ? '🎉 Luar biasa!' : '💪 Terus semangat!'}</h2>
      <p class="muted" style="margin-top:6px">
        ${mode === 'baseline'
          ? 'Hasil Asesmen Awal tersimpan sebagai baseline pembelajaran.'
          : pass
            ? 'Kamu memenuhi KKM Asesmen Akhir (≥70%). Pertahankan!'
            : 'Belum mencapai KKM 70%. Kamu bisa mengulangi kapan saja.'}
      </p>
      <div class="result-actions">
        <button class="btn btn-secondary" onclick="navigate('dashboard')">🏠 Beranda</button>
        ${mode === 'final'
          ? `<button class="btn btn-primary" onclick="navigate('assessment')">🔄 Ulangi</button>`
          : ''}
      </div>
    </div>
    <div class="review-box">
      <h3>📝 Pembahasan Soal</h3>
      ${items}
    </div>`;
  navigate('result');
}

// GLOSARIUM

function renderGlosarium() {

  const items = GLOSSARY_DATA.slice().sort((a,b) => a.term.localeCompare(b.term));
  root.innerHTML = `
    <div class="page-head">

    </div>
    <input class="form-input" id="gloss-search" placeholder="Cari istilah…">
    <div id="gloss-count" class="muted gloss-count">${items.length} istilah</div>
    <div id="gloss-list" class="gloss-list">
      ${items.map(g => `
        <div class="gloss-item" data-term="${escapeHtml(g.term.toLowerCase())}" data-def="${escapeHtml(g.def.toLowerCase())}">
          <div class="gi-term">${escapeHtml(g.term)}</div>
          <div class="gi-def">${markdownInline(g.def)}</div>
        </div>`).join('')}
    </div>`;

  $('#gloss-search').addEventListener('input', e => {
    const q = e.target.value.trim().toLowerCase();

  });

              <td>${fmtDate(x.createdAt)}</td>
              <td>${x.status === 'pending'
                ? '<span class="tag" style="background:rgba(255,179,0,0.2);color:var(--warning)">Menunggu</span>'
                : '<span class="tag" style="background:rgba(255,82,82,0.2);color:var(--danger)">Ditolak</span>'}</td>
              <td>
                ${x.status === 'pending' ? `
                  <button class="btn btn-success btn-sm" onclick="approveStudent('${x.uid}')">✓ Setujui</button>
                  <button class="btn btn-danger btn-sm"  onclick="rejectStudent('${x.uid}')">✗ Tolak</button>
                ` : `
                  <button class="btn btn-info btn-sm" onclick="approveStudent('${x.uid}')">↺ Setujui Ulang</button>
                `}
              </td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;

  $('#pen-search').addEventListener('input', e => {
    const q = e.target.value.toLowerCase();
    $$('#pen-rows tr').forEach(tr => {
      tr.style.display = (!q || tr.dataset.q.includes(q)) ? '' : 'none';
    });
  });
}

async function approveStudent(uid) {
  const adminUid = state.currentUser?.uid;
  await dbMerge('users', uid, {
    status: 'approved',
    approvedAt: serverTime(),
    approvedBy: adminUid || 'guru'
  });
  toast('Akun disetujui', 'success');
  renderAdmin();
}

async function rejectStudent(uid) {
  if (!confirm('Tolak pendaftaran akun ini? User tidak akan dapat mengakses platform.')) return;
  const adminUid = state.currentUser?.uid;
  await dbMerge('users', uid, {
    status: 'rejected',
    approvedAt: serverTime(),
    approvedBy: adminUid || 'guru'
  });
  toast('Akun ditolak', 'info');
  renderAdmin();
}

async function renderAdminStudents() {
  const body = $('#admin-body');
  const users = (await dbGetAll('users'))
    .filter(u => u.role === 'siswa' && u.status === 'approved');

  if (users.length === 0) {
    body.innerHTML = `<div class="card" style="text-align:center">Belum ada siswa aktif.</div>`;
    return;
  }

  // Gabung dengan progress
  const progressList = await dbGetAll('progress');
  const byUid = Object.fromEntries(progressList.map(p => [p.id, p]));

  const totalLessons = state.modules
    .filter(m => m.type === 'content')
    .reduce((s,m) => s + (m.lessons?.length || 0), 0);

  body.innerHTML = `
    <div class="toolbar">
      <input id="stu-search" class="form-input" placeholder="Cari nama/email…" style="max-width:280px">
      <button class="btn btn-info btn-sm" onclick="exportCsv('students')">⬇️ Export CSV</button>
    </div>
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr>
          <th>Nama</th><th>Email</th><th>Progres</th><th>Asesmen Awal</th><th>Aksi</th>
        </tr></thead>
        <tbody id="stu-rows">
          ${users.map(u => {
            const p = byUid[u.uid] || { completed: [] };
            const done = p.completed?.length || 0;
            const pct = totalLessons ? Math.round((done/totalLessons)*100) : 0;
            const baseline = p.baseline ? p.baseline.score + '%' : '—';
            return `<tr data-q="${escapeHtml((u.name+' '+u.email).toLowerCase())}">
              <td>${escapeHtml(u.name)}</td>
              <td>${escapeHtml(u.email)}</td>
              <td>${pct}% (${done}/${totalLessons})</td>
              <td>${baseline}</td>
              <td>
                <button class="btn btn-warning btn-sm" onclick="rejectStudent('${u.uid}')">Nonaktifkan</button>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;

  $('#stu-search').addEventListener('input', e => {
    const q = e.target.value.toLowerCase();
    $$('#stu-rows tr').forEach(tr => {
      tr.style.display = (!q || tr.dataset.q.includes(q)) ? '' : 'none';
    });
  });
}

async function renderAdminResults() {
  const body = $('#admin-body');
  const attempts = (await dbGetAll('finalAttempts'))
    .sort((a,b) => String(b.at).localeCompare(String(a.at)));

  if (attempts.length === 0) {
    body.innerHTML = `<div class="card" style="text-align:center">Belum ada siswa yang mengerjakan Asesmen Akhir.</div>`;
    return;
  }

  body.innerHTML = `
    <div class="toolbar">
      <input id="res-search" class="form-input" placeholder="Cari nama/email…" style="max-width:280px">
      <button class="btn btn-info btn-sm" onclick="exportCsv('results')">⬇️ Export CSV</button>
    </div>
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr>
          <th>Nama</th><th>Email</th><th>Skor</th><th>Benar</th><th>Waktu</th>
        </tr></thead>
        <tbody id="res-rows">
          ${attempts.map(a => `
            <tr data-q="${escapeHtml(((a.name||'')+' '+(a.email||'')).toLowerCase())}">
              <td>${escapeHtml(a.name || '—')}</td>
              <td>${escapeHtml(a.email || '—')}</td>
              <td><strong style="color:${a.score>=70?'var(--success)':'var(--danger)'}">${a.score}%</strong></td>
              <td>${a.correct}/${a.total}</td>
              <td>${fmtDate(a.at)}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;

  $('#res-search').addEventListener('input', e => {
    const q = e.target.value.toLowerCase();
    $$('#res-rows tr').forEach(tr => {
      tr.style.display = (!q || tr.dataset.q.includes(q)) ? '' : 'none';
    });
  });
}

// ============================================
// EXPORT CSV
// ============================================
async function exportCsv(kind) {
  let rows = [];
  let filename = '';

  if (kind === 'students') {
    const users = (await dbGetAll('users')).filter(u => u.role === 'siswa');
    const progressList = await dbGetAll('progress');
    const byUid = Object.fromEntries(progressList.map(p => [p.id, p]));
    const totalLessons = state.modules.filter(m => m.type==='content')
      .reduce((s,m) => s + (m.lessons?.length || 0), 0);

    rows = [['Nama','Email','Status','Progres %','Materi Selesai','Total Materi','Skor Asesmen Awal']];
    users.forEach(u => {
      const p = byUid[u.uid] || { completed: [] };
      const done = p.completed?.length || 0;
      const pct = totalLessons ? Math.round((done/totalLessons)*100) : 0;
      rows.push([u.name, u.email, u.status, pct, done, totalLessons, p.baseline?.score ?? '']);
    });
    filename = 'tktc_siswa_' + new Date().toISOString().slice(0,10) + '.csv';
  } else if (kind === 'results') {
    const attempts = await dbGetAll('finalAttempts');
    rows = [['Nama','Email','Skor %','Benar','Total','Tanggal']];
    attempts.forEach(a => rows.push([a.name||'', a.email||'', a.score, a.correct, a.total, fmtDate(a.at)]));
    filename = 'tktc_hasil_' + new Date().toISOString().slice(0,10) + '.csv';
  }

  const csv = rows.map(r => r.map(v => {
    const s = String(v ?? '');
    return /[",\n]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s;
  }).join(',')).join('\n');

  const blob = new Blob(['\ufeff' + csv], { type:'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
  toast('CSV diunduh', 'success');
}
